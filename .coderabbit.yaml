# .coderabbit.yaml — sigil-open-framework (documentation/specification repo)

reviews:
  auto_review:
    enabled: true

  path_instructions:
    - path: "architecture.md"
      instructions: |
        Canonical public architecture document for the Sigil Open Framework.
        - Verify all component descriptions match current implementations.
        - Check that the three-layer model (Firewall/Engine/Rules) is consistently described.
        - Flag any claims about features not yet shipped.
        - Cryptographic descriptions must be precise.

    - path: "components/**/*.md"
      instructions: |
        Component specification documents covering OEE, FAF, sigil-attestations, sigil-command, and sigil-vault.
        - Verify each component spec is current with its corresponding repo.
        - Check cross-references between components for consistency.
        - Flag stale version numbers or outdated API descriptions.

    - path: "framework-registry.json"
      instructions: |
        Registry of supported agent frameworks.
        - Verify each entry has all required fields.
        - Check that listed frameworks match what agent-hooks and agent-hooks-rs actually support.

    - path: "framework-registry.md"
      instructions: |
        Human-readable documentation of the framework registry.
        - Must stay in sync with framework-registry.json.
        - Flag any framework listed in one but not the other.

    - path: "**/*.md"
      instructions: |
        Check for internal consistency across all documents. Flag contradictions.
        This is a public-facing repo — language should be precise and professional.

  path_filters:
    - "!.claude/**"
    - "!demo/**"
